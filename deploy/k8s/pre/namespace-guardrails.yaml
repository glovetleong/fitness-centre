apiVersion: v1
kind: ResourceQuota
metadata:
  name: fitness-centre-quota
  namespace: fitness-centre
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: fitness-centre-limits
  namespace: fitness-centre
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      type: Container
---
# SEC: Scoped allowlist — ALB → app ports; app → RDS (3306) and HTTPS APIs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fitness-centre-apps
  namespace: fitness-centre
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: fitness-centre
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 80
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 443
