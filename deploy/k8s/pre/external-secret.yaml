apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fitness-centre-app
  namespace: fitness-centre
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: fitness-centre-app
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: REPLACE_SECRET_MANAGER_NAME
