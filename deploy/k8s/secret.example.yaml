apiVersion: v1
kind: Secret
metadata:
  name: fitness-centre-app
  namespace: fitness-centre
type: Opaque
stringData:
  DB_HOST: mysql
  DB_USER: fitness
  DB_PASS: CHANGE_ME_STRONG_PASSWORD
  DB_NAME: fitness_centre
  JWT_SECRET: CHANGE_ME_RANDOM_JWT_SECRET
  MYSQL_ROOT_PASSWORD: CHANGE_ME_ROOT_PASSWORD
