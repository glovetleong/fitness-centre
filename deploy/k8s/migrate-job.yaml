apiVersion: batch/v1
kind: Job
metadata:
  name: fitness-centre-migrate
  namespace: fitness-centre
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate
        app.kubernetes.io/part-of: fitness-centre
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: REPLACE_BACKEND_IMAGE
          command: ["node", "migrate-k8s.js"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: fitness-centre-app
