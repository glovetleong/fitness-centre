# Push to master/main: test → scan → build → deploy to EKS (PRE gates in one workflow).
# PRs: test and scan only (no deploy).

name: Deploy non-prod

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# SEC: id-token required for OIDC → AWS (build-and-deploy job).
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: "956314528442"
  EKS_CLUSTER_NAME: non-prod-eks
  K8S_NAMESPACE: fitness-centre
  ECR_BACKEND_REPO: fitness-centre/backend
  ECR_FRONTEND_REPO: fitness-centre/frontend
  # Secrets or Variables tab (either works).
  USE_RDS: ${{ vars.USE_RDS || secrets.USE_RDS }}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  build-and-deploy:
    needs: [backend, frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "::error::Repository secret AWS_ROLE_ARN is missing or empty."
            echo "Add it under Settings → Secrets and variables → Actions → Secrets"
            echo "Value: arn:aws:iam::956314528442:role/github-actions-fitness-centre"
            echo "See deploy/CICD-SETUP.md (Part C)"
            exit 1
          fi
          echo "AWS_ROLE_ARN is set."
          USE_RDS="${{ vars.USE_RDS || secrets.USE_RDS }}"
          if [ "$USE_RDS" = "true" ]; then
            SECRET_NAME="${{ vars.FITNESS_APP_SECRET_NAME || secrets.FITNESS_APP_SECRET_NAME }}"
            WAF_ARN="${{ vars.WAF_ACL_ARN || secrets.WAF_ACL_ARN }}"
            test -n "$SECRET_NAME" || { echo "::error::Set FITNESS_APP_SECRET_NAME (secret or variable)"; exit 1; }
            test -n "$WAF_ARN" || { echo "::error::Set WAF_ACL_ARN (secret or variable)"; exit 1; }
            echo "$WAF_ARN" | grep -q '^arn:aws:wafv2:' || {
              echo "::error::WAF_ACL_ARN must be the full ARN from: terraform output -raw waf_acl_arn"
              echo "Do not paste the terraform command text as the value."
              exit 1
            }
            echo "PRE mode (USE_RDS=true) OK."
          else
            echo "USE_RDS is not true — PoC mode or set USE_RDS=true (secret or variable)."
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          aws ecr describe-repositories --repository-names "${{ env.ECR_BACKEND_REPO }}" 2>/dev/null \
            || aws ecr create-repository --repository-name "${{ env.ECR_BACKEND_REPO }}" --image-scanning-configuration scanOnPush=true
          aws ecr describe-repositories --repository-names "${{ env.ECR_FRONTEND_REPO }}" 2>/dev/null \
            || aws ecr create-repository --repository-name "${{ env.ECR_FRONTEND_REPO }}" --image-scanning-configuration scanOnPush=true

      - name: Build and push backend image
        env:
          IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}
        run: |
          TAG="${{ github.sha }}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" ./backend
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "BACKEND_IMAGE=$IMAGE:$TAG" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          skip-files: usr/local/lib/node_modules/**

      - name: Build and push frontend image
        env:
          IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" ./frontend
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "FRONTEND_IMAGE=$IMAGE:$TAG" >> "$GITHUB_ENV"

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        if: env.USE_RDS == 'true'
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Apply namespace and guardrails
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/pre/namespace-guardrails.yaml

      - name: Remove legacy in-cluster MySQL (PRE / RDS)
        if: env.USE_RDS == 'true'
        run: |
          kubectl delete deployment mysql -n "${{ env.K8S_NAMESPACE }}" --ignore-not-found
          kubectl delete pvc mysql-pvc -n "${{ env.K8S_NAMESPACE }}" --ignore-not-found

      - name: Install External Secrets Operator
        if: env.USE_RDS == 'true'
        env:
          ESO_ROLE_ARN: ${{ vars.EXTERNAL_SECRETS_ROLE_ARN || secrets.EXTERNAL_SECRETS_ROLE_ARN }}
        run: |
          ROLE_ARN="${ESO_ROLE_ARN:-arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/non-prod-external-secrets}"
          echo "Using ESO IRSA role: $ROLE_ARN"
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --version 0.19.2 \
            --set installCRDs=true \
            --set serviceAccount.name=external-secrets \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${ROLE_ARN}" \
            --wait --timeout 10m
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=180s
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=180s
          kubectl rollout status deployment/external-secrets -n external-secrets --timeout=300s
          kubectl api-resources --api-group=external-secrets.io

      - name: Sync secrets from AWS Secrets Manager
        if: env.USE_RDS == 'true'
        env:
          SECRET_NAME: ${{ vars.FITNESS_APP_SECRET_NAME || secrets.FITNESS_APP_SECRET_NAME }}
        run: |
          test -n "$SECRET_NAME" || { echo "Set repository variable FITNESS_APP_SECRET_NAME (e.g. non-prod/fitness-centre/app)"; exit 1; }
          kubectl api-resources --api-group=external-secrets.io | grep -q 'clustersecretstores' || {
            echo "::error::ClusterSecretStore CRD missing — check Install External Secrets Operator step"
            exit 1
          }
          kubectl apply -f deploy/k8s/pre/cluster-secret-store.yaml
          sed "s|REPLACE_SECRET_MANAGER_NAME|$SECRET_NAME|g" deploy/k8s/pre/external-secret.yaml | kubectl apply -f -
          kubectl wait --for=condition=Ready externalsecret/fitness-centre-app \
            -n "${{ env.K8S_NAMESPACE }}" --timeout=300s
          kubectl get secret fitness-centre-app -n "${{ env.K8S_NAMESPACE }}"

      - name: Apply application secrets (PoC in-cluster DB)
        if: env.USE_RDS != 'true'
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          kubectl create secret generic fitness-centre-app \
            --namespace="${{ env.K8S_NAMESPACE }}" \
            --from-literal=DB_HOST=mysql \
            --from-literal=DB_USER=fitness \
            --from-literal=DB_PASS="$DB_PASS" \
            --from-literal=DB_NAME=fitness_centre \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare node capacity (t3.small max 11 pods)
        run: |
          kubectl scale deployment ebs-csi-controller -n kube-system --replicas=1 || true
          kubectl rollout status deployment/ebs-csi-controller -n kube-system --timeout=120s || true

      - name: Deploy in-cluster MySQL (PoC only)
        if: env.USE_RDS != 'true'
        run: |
          kubectl apply -f deploy/k8s/mysql-pvc.yaml
          kubectl apply -f deploy/k8s/mysql.yaml
          for i in $(seq 1 30); do
            if kubectl rollout status deployment/mysql -n "${{ env.K8S_NAMESPACE }}" --timeout=120s; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Run database migration
        run: |
          kubectl delete job fitness-centre-migrate -n "${{ env.K8S_NAMESPACE }}" --ignore-not-found
          sed "s|REPLACE_BACKEND_IMAGE|${BACKEND_IMAGE}|g" deploy/k8s/migrate-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/fitness-centre-migrate \
            -n "${{ env.K8S_NAMESPACE }}" --timeout=600s || {
              kubectl logs -n "${{ env.K8S_NAMESPACE }}" job/fitness-centre-migrate --tail=100
              exit 1
            }

      - name: Deploy backend and frontend
        run: |
          sed "s|REPLACE_BACKEND_IMAGE|${BACKEND_IMAGE}|g" deploy/k8s/backend.yaml | kubectl apply -f -
          sed "s|REPLACE_FRONTEND_IMAGE|${FRONTEND_IMAGE}|g" deploy/k8s/frontend.yaml | kubectl apply -f -
          kubectl apply -f deploy/k8s/backend-hpa.yaml
          kubectl rollout status deployment/backend -n "${{ env.K8S_NAMESPACE }}" --timeout=300s || {
            kubectl get pods -n "${{ env.K8S_NAMESPACE }}" -l app=backend -o wide
            kubectl describe pods -n "${{ env.K8S_NAMESPACE }}" -l app=backend | tail -80
            kubectl logs -n "${{ env.K8S_NAMESPACE }}" -l app=backend --tail=80 --all-containers=true || true
            exit 1
          }
          kubectl rollout status deployment/frontend -n "${{ env.K8S_NAMESPACE }}" --timeout=300s || {
            kubectl get pods -n "${{ env.K8S_NAMESPACE }}" -l app=frontend -o wide
            kubectl logs -n "${{ env.K8S_NAMESPACE }}" -l app=frontend --tail=50 || true
            exit 1
          }

      - name: Deploy Ingress (PRE — WAF / optional HTTPS)
        if: env.USE_RDS == 'true'
        env:
          WAF_ACL_ARN: ${{ vars.WAF_ACL_ARN || secrets.WAF_ACL_ARN }}
          ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN || secrets.ACM_CERTIFICATE_ARN }}
        run: |
          test -n "$WAF_ACL_ARN" || { echo "Set repository variable WAF_ACL_ARN from: terraform output waf_acl_arn"; exit 1; }
          if [ -n "$ACM_CERTIFICATE_ARN" ]; then
            LISTEN='[{"HTTPS":443},{"HTTP":80}]'
            sed -e "s|REPLACE_WAF_ACL_ARN|$WAF_ACL_ARN|g" \
                -e "s|REPLACE_LISTEN_PORTS|$LISTEN|g" \
                -e "s|REPLACE_SSL_REDIRECT|443|g" \
                -e "s|REPLACE_ACM_CERT_ARN|$ACM_CERTIFICATE_ARN|g" \
                deploy/k8s/ingress-pre.yaml | kubectl apply -f -
          else
            sed "s|REPLACE_WAF_ACL_ARN|$WAF_ACL_ARN|g" deploy/k8s/ingress-pre-http.yaml | kubectl apply -f -
          fi

      - name: Deploy Ingress (PoC HTTP)
        if: env.USE_RDS != 'true'
        run: kubectl apply -f deploy/k8s/ingress.yaml

      - name: Deployment summary
        run: |
          echo "## Deployed images" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: \`${BACKEND_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: \`${FRONTEND_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- USE_RDS: \`${{ env.USE_RDS }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Ingress" >> "$GITHUB_STEP_SUMMARY"
          kubectl get ingress -n "${{ env.K8S_NAMESPACE }}" -o wide >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          kubectl get hpa -n "${{ env.K8S_NAMESPACE }}" >> "$GITHUB_STEP_SUMMARY" || true
